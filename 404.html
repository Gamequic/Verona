<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada | Verona Floral Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coral: #C96840;
      --coral-light: #e8845e;
      --cream: #FAF9F6;
      --charcoal: #1A1917;
      --stone: #78716c;
    }

    body {
      min-height: 100vh;
      background-color: var(--cream);
      color: var(--charcoal);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    header {
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(26,25,23,0.08);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--charcoal);
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .logo span {
      color: var(--coral);
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
    }

    .number {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(7rem, 20vw, 10rem);
      font-weight: 600;
      line-height: 1;
      color: var(--coral);
      opacity: 0.18;
      user-select: none;
    }

    .icon {
      margin: -1rem auto 0;
      width: 64px;
      height: 64px;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 400;
      color: var(--charcoal);
      margin-top: 1.25rem;
    }

    p {
      color: var(--stone);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-top: 0.75rem;
    }

    .divider {
      width: 2.5rem;
      height: 1px;
      background: var(--coral);
      opacity: 0.4;
      margin: 1.75rem auto;
    }

    .btn {
      display: inline-block;
      background-color: var(--coral);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.85rem 2.25rem;
      border-radius: 2px;
      transition: background-color 0.2s ease;
    }

    .btn:hover {
      background-color: var(--coral-light);
    }

    /* Footer */
    footer {
      padding: 1.5rem 2rem;
      text-align: center;
      border-top: 1px solid rgba(26,25,23,0.08);
    }

    footer p {
      font-size: 0.78rem;
      color: var(--stone);
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">Verona <span>Floral</span> Studio</a>
  </header>

  <main>
    <div class="container">
      <div class="number">404</div>

      <svg class="icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="20" r="9" stroke="#C96840" stroke-width="1.5" fill="none"/>
        <path d="M23 20 C23 14 20 8 26 6 C26 12 30 16 32 20" stroke="#C96840" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M41 20 C41 14 44 8 38 6 C38 12 34 16 32 20" stroke="#C96840" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M32 20 L32 46" stroke="#C96840" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 56 Q32 48 42 56" stroke="#C96840" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>

      <h1>Esta página no existe</h1>
      <p>La dirección que buscas no está disponible.<br>Puede que haya sido movida o eliminada.</p>

      <div class="divider"></div>

      <a href="/" class="btn">Volver al inicio</a>
    </div>
  </main>

  <footer>
    <p>© 2025 Verona Floral Studio · Todos los derechos reservados</p>
  </footer>

</body>
</html>
